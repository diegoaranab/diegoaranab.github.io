<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Me Perdonas Ale?</title>
    <style>
        body {
            text-align: center;
            margin-top: 10%;
            font-family: Arial, sans-serif;
            font-size: 5em;
            color: rgb(6, 6, 185);
            font-weight: 500;
        }

        #yes-button,
        #no-button {
            margin: 10px;
            padding: 5px 15px;
            cursor: pointer;
            font-size: .33em;
            color: black;
        }

        #love-message,
        #heart {
            display: none;
            font-size: 1em;
            color: rgb(15, 15, 184);
            font-weight: 500;
        }

        #heart {
            font-size: 48px;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.3);
            }

            100% {
                transform: scale(1);
            }
        }
    </style>
    <script>
        function yesClicked() {
            document.getElementById('question').style.display = 'none';
            document.getElementById('yes-button').style.display = 'none';
            document.getElementById('no-button').style.display = 'none';
            document.getElementById('love-message').style.display = 'block';
            document.getElementById('heart').style.display = 'block';
        }

        function noHovered() {
            var noButton = document.getElementById('no-button');
            var x = Math.random() * (window.innerWidth - noButton.clientWidth);
            var y = Math.random() * (window.innerHeight - noButton.clientHeight);
            noButton.style.position = 'absolute';
            noButton.style.left = x + 'px';
            noButton.style.top = y + 'px';
        }
    </script>
</head>

<body>
    <div id="question">Me Perdonas Ale?</div>
    <button id="yes-button" onclick="yesClicked()">Si</button>
    <button id="no-button" onmouseover="noHovered()">No</button>
    <div id="love-message">Yo también te amo Ale!!!!!!!!!!</div>
    <div id="heart">❤️</div>
</body>

</html>
